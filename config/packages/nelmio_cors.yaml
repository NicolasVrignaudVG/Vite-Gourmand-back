nelmio_cors:
    defaults:
        # true : permet d'utiliser un pattern regex dans CORS_ALLOW_ORIGIN
        # (nécessaire pour le dev local où on définit ^https?://(localhost|127\.0\.0\.1)(:\d+)?$)
        origin_regex: true
        allow_origin:
            - '%env(CORS_ALLOW_ORIGIN)%'
            - '^https://.*\.vercel\.app$'
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization']
        allow_credentials: true
        expose_headers: ['Link']
        max_age: 3600
    paths:
        '^/api/':
            allow_origin:
                - '%env(CORS_ALLOW_ORIGIN)%'
                - '^https://.*\.vercel\.app$'
            allow_headers: ['Content-Type', 'Authorization']
            allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
            allow_credentials: true
            max_age: 3600
