# config/packages/nelmio_security.yaml
# ─────────────────────────────────────────────────────────────────
# Headers de sécurité HTTP
# Installation : composer require nelmio/security-bundle
# ─────────────────────────────────────────────────────────────────

nelmio_security:

    # ── X-Content-Type-Options: nosniff ──────────────────────
    content_type:
        nosniff: true

    # ── X-Frame-Options ──────────────────────────────────────
    clickjacking:
        paths:
            '^/.*': SAMEORIGIN

    # ── Strict-Transport-Security (HSTS) ─────────────────────
    # forced_ssl avec redirect: false envoie uniquement le header HSTS
    # sans rediriger HTTP→HTTPS (Render gère la redirection en amont).
    forced_ssl:
        enabled: true
        redirect: false
        hsts_max_age: 31536000
        hsts_subdomains: true

    # ── Referrer-Policy ──────────────────────────────────────
    referrer_policy:
        enabled: true
        policies:
            - 'strict-origin-when-cross-origin'

    # ── Permissions-Policy ───────────────────────────────────
    # Désactive les APIs navigateur non utilisées par l'application
    permissions_policy:
        enabled: true
        urls:
            '^/.*':
                camera: "'none'"
                microphone: "'none'"
                geolocation: "'none'"
                payment: "'none'"
                usb: "'none'"
                fullscreen: 'self'

    # ── Content-Security-Policy ──────────────────────────────
    # Ce CSP s'applique à l'API back-end uniquement (pas au front Vercel).
    # L'API ne sert pas de pages HTML avec scripts — unsafe-inline retiré.
    csp:
        enabled: true
        hosts: []
        content_types: []
        enforce:
            default-src:
                - 'self'
            script-src:
                - 'self'
                # unsafe-inline retiré — l'API ne sert pas de scripts inline
            style-src:
                - 'self'
                - 'unsafe-inline'             # Symfony error pages utilisent du CSS inline
            font-src:
                - 'self'
            img-src:
                - 'self'
                - 'data:'
            connect-src:
                - 'self'
            frame-ancestors:
                - 'none'
            form-action:
                - 'self'
            object-src:
                - 'none'
            base-uri:
                - 'self'
