# config/packages/nelmio_security.yaml

nelmio_security:

    content_type:
        nosniff: true

    clickjacking:
        paths:
            '^/.*': SAMEORIGIN

    # HSTS — redirect_status_code: 0 = envoie le header sans rediriger
    # (Render gère déjà la redirection HTTP→HTTPS en amont)
    forced_ssl:
        enabled: true
        hsts_max_age: 31536000
        hsts_subdomains: true
        redirect_status_code: 0

    referrer_policy:
        enabled: true
        policies:
            - 'strict-origin-when-cross-origin'

    permissions_policy:
        enabled: true
        urls:
            '^/.*':
                camera: "'none'"
                microphone: "'none'"
                geolocation: "'none'"
                payment: "'none'"
                usb: "'none'"
                fullscreen: 'self'

    csp:
        enabled: true
        hosts: []
        content_types: []
        enforce:
            default-src:
                - 'self'
            script-src:
                - 'self'
            style-src:
                - 'self'
                - 'unsafe-inline'
            font-src:
                - 'self'
            img-src:
                - 'self'
                - 'data:'
            connect-src:
                - 'self'
            frame-ancestors:
                - 'none'
            form-action:
                - 'self'
            object-src:
                - 'none'
            base-uri:
                - 'self'
