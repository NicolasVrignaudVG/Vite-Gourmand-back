# config/packages/nelmio_security.yaml

nelmio_security:

    content_type:
        nosniff: true

    clickjacking:
        paths:
            '^/.*': SAMEORIGIN

    referrer_policy:
        enabled: true
        policies:
            - 'strict-origin-when-cross-origin'

    permissions_policy:
        enabled: true
        policies:
            camera: []
            microphone: []
            geolocation: []
            payment: []
            usb: []
            fullscreen: ['self']

    csp:
        enabled: true
        hosts: []
        content_types: []
        enforce:
            default-src:
                - 'self'
            script-src:
                - 'self'
            style-src:
                - 'self'
                - 'unsafe-inline'
            font-src:
                - 'self'
            img-src:
                - 'self'
                - 'data:'
            connect-src:
                - 'self'
            frame-ancestors:
                - 'none'
            form-action:
                - 'self'
            object-src:
                - 'none'
            base-uri:
                - 'self'
