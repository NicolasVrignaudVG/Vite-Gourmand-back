# config/packages/nelmio_security.yaml

nelmio_security:

    content_type:
        nosniff: true

    clickjacking:
        paths:
            '^/.*': SAMEORIGIN

    # HSTS — redirect_status_code: 302 pour rediriger HTTP→HTTPS
    # Render gère déjà HTTPS mais ce header indique aux navigateurs
    # de toujours utiliser HTTPS (1 an)
    forced_ssl:
        hsts_max_age: 31536000
        hsts_subdomains: true
        redirect_status_code: 302

    referrer_policy:
        enabled: true
        policies:
            - 'strict-origin-when-cross-origin'

    # Syntaxe officielle : policies avec listes vides = bloquer
    permissions_policy:
        enabled: true
        policies:
            camera: []
            microphone: []
            geolocation: []
            payment: []
            usb: []
            fullscreen: ['self']

    csp:
        enabled: true
        hosts: []
        content_types: []
        enforce:
            default-src:
                - 'self'
            script-src:
                - 'self'
            style-src:
                - 'self'
                - 'unsafe-inline'
            font-src:
                - 'self'
            img-src:
                - 'self'
                - 'data:'
            connect-src:
                - 'self'
            frame-ancestors:
                - 'none'
            form-action:
                - 'self'
            object-src:
                - 'none'
            base-uri:
                - 'self'
