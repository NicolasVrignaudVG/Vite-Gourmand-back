# config/packages/nelmio_security.yaml

nelmio_security:

    content_type:
        nosniff: true

    clickjacking:
        paths:
            '^/.*': SAMEORIGIN

    referrer_policy:
        enabled: true
        policies:
            - 'strict-origin-when-cross-origin'

    permissions_policy:
        enabled: true
        policies:
            camera: []
            microphone: []
            geolocation: []
            payment: []
            usb: []
            fullscreen: ['self']

    csp:
        enabled: true
        # La CSP stricte ci-dessous s'applique partout SAUF sur /api/doc,
        # grâce au request_matcher défini dans services.yaml.
        # La page Swagger UI (documentation technique) échappe ainsi à la CSP,
        # ce qui permet à son script inline de s'exécuter, sans affaiblir
        # la sécurité du reste de l'application.
        request_matcher: 'nelmio_security.csp_request_matcher'
        hosts: []
        content_types: []
        enforce:
            default-src:
                - 'self'
            script-src:
                - 'self'
            style-src:
                - 'self'
                - 'unsafe-inline'
            font-src:
                - 'self'
            img-src:
                - 'self'
                - 'data:'
            connect-src:
                - 'self'
            frame-ancestors:
                - 'none'
            form-action:
                - 'self'
            object-src:
                - 'none'
            base-uri:
                - 'self'
