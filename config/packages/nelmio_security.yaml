# config/packages/nelmio_security.yaml

nelmio_security:

    # ── X-Content-Type-Options: nosniff ──────────────────────
    content_type:
        nosniff: true

    # ── X-Frame-Options ──────────────────────────────────────
    clickjacking:
        paths:
            '^/.*': SAMEORIGIN

    # ── Strict-Transport-Security (HSTS) ─────────────────────
    # redirect: false = envoie le header sans rediriger HTTP→HTTPS
    # (Render gère la redirection en amont, sinon boucle infinie)
    forced_ssl:
        enabled: true
        redirect: false
        hsts_max_age: 31536000
        hsts_subdomains: true

    # ── Referrer-Policy ──────────────────────────────────────
    referrer_policy:
        enabled: true
        policies:
            - 'strict-origin-when-cross-origin'

    # ── Permissions-Policy ───────────────────────────────────
    permissions_policy:
        enabled: true
        urls:
            '^/.*':
                camera: "'none'"
                microphone: "'none'"
                geolocation: "'none'"
                payment: "'none'"
                usb: "'none'"
                fullscreen: 'self'

    # ── Content-Security-Policy ──────────────────────────────
    csp:
        enabled: true
        hosts: []
        content_types: []
        enforce:
            default-src:
                - 'self'
            script-src:
                - 'self'
            style-src:
                - 'self'
                - 'unsafe-inline'
            font-src:
                - 'self'
            img-src:
                - 'self'
                - 'data:'
            connect-src:
                - 'self'
            frame-ancestors:
                - 'none'
            form-action:
                - 'self'
            object-src:
                - 'none'
            base-uri:
                - 'self'
