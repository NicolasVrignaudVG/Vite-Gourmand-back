framework:
    rate_limiter:
        login_limiter:
            policy: sliding_window
            limit: 5
            interval: '1 minute'

        register_limiter:
            policy: sliding_window
            limit: 3
            interval: '10 minutes'

        forgot_password_limiter:
            policy: sliding_window
            limit: 3
            interval: '15 minutes'
