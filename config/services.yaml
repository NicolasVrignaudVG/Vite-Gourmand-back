# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    App\Service\MongoService:
        arguments:
            $mongoUri: '%env(MONGO_URI)%'
            $mongoDB:  '%env(MONGO_DB)%'

    App\Service\DeliveryService:
        arguments:
            $orsApiKey: '%env(ORS_API_KEY)%'

    App\Controller\UploadController:
        arguments:
            $uploadDir: '%kernel.project_dir%/public/images'


    App\Service\MailerService:
        arguments:
            $from: '%env(MAILER_SENDER_EMAIL)%'
            $fromName: '%env(MAILER_SENDER_NAME)%'

    App\Controller\AuthController:
        arguments:
            $loginLimiter: '@limiter.login_limiter'
            $registerLimiter: '@limiter.register_limiter'
            $forgotPasswordLimiter: '@limiter.forgot_password_limiter'

    App\EventSubscriber\LoginRateLimiterSubscriber:
        arguments:
            $loginLimiter: '@limiter.login_limiter'
        tags:
            - { name: kernel.event_subscriber }

    # Injection de l'environnement (dev/prod) dans l'ExceptionListener :
    # permet d'afficher les détails d'erreur (file/line) uniquement en dev,
    # et un message générique en production (pas de fuite d'informations).
    App\EventListener\ExceptionListener:
        arguments:
            $environment: '%kernel.environment%'

    # Request matcher : la CSP stricte s'applique partout SAUF sur /api/doc
    # (la page Swagger UI charge un script inline non couvert par la CSP stricte).
    # La regex négative "^/(?!api/doc)" matche toutes les URLs sauf celles
    # commençant par /api/doc, qui échappent donc à la CSP.
    nelmio_security.csp_request_matcher:
        class: Symfony\Component\HttpFoundation\RequestMatcher\PathRequestMatcher
        arguments:
            $regexp: '^/(?!api/doc)'
